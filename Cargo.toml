[workspace]
resolver = "3"
members = [
    # input [Optionally Packaged]
    "crates/svg-read",

    # core [NEEDED]
    "crates/ir", # Contains input IR required
    "crates/devices", # Contains devices & information about them
    "crates/build" # Resolves, Places, and Routes circuit
    "crates/resolve" # Resolves circuit, finds constraints

    # output [Optionally Packaged] Or use can define own output
    "crates/svg", # Package as SVG Output
]

[workspace.package]
edition = "2024"
rust-version = "1.85"
license = "MIT OR Apache-2.0"

[workspace.lints.rust]
unsafe_code = "forbid"

[workspace.dependencies]
# core
serde = { version = "1", features = ["derive"] }
serde_json = "1"
ron = "0.8"
thiserror = "1"

# Workspace aliases
svg-read = { path = "crates/svg-read" }

ir = { path = "crates/ir" }
devices = { path = "crates/devices" }
build = { path = "crates/build" }
resolve = { path = "crates/resolve" }

svg = { path = "crates/svg" }
