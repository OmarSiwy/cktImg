name: ci

on:
  push:
  pull_request:

jobs:
  gates:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: cachix/install-nix-action@v27
      # All gates run through the flake's pinned 1.85 toolchain (IMPLEMENTATION §13).
      - run: nix develop --command cargo fmt --check
      - run: nix develop --command cargo clippy --workspace --all-targets -- -D warnings
      - run: nix develop --command cargo test --workspace
      # wasm32 build of every library crate (the CLI is the only native crate).
      - run: |
          nix develop --command cargo build --target wasm32-unknown-unknown \
            -p ckt-ir -p ckt-symbols -p ckt-resolve -p ckt-session -p ckt-place \
            -p ckt-build -p ckt-parse -p ckt-svg -p ckt-svg-read
