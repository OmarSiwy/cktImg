name: latex

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2

      - name: Test
        run: cargo test -p cktimg-latex --release

      - name: Build (optimized)
        run: cargo build -p cktimg-latex --release

      # cktimg isn't on crates.io yet, so package it (and its deps) alongside
      # for local verification (cargo >= 1.90).
      - name: Package
        run: cargo package -p cktimg-netlist -p cktimg-ir -p cktimg-devices -p cktimg-config -p cktimg-build -p cktimg -p cktimg-latex --allow-dirty

      - uses: actions/upload-artifact@v4
        with:
          name: cktimg-latex-crate
          path: target/package/cktimg-latex-*.crate

      # The binary + style file are what paper authors actually install.
      - uses: actions/upload-artifact@v4
        with:
          name: cktimg-latex-tool
          path: |
            target/release/cktimg-latex
            export/latex/cktimg.sty

  publish:
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      # cktimg must already be on crates.io for this to resolve.
      - run: cargo publish -p cktimg-latex
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
