name: library

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2

      - name: Test
        run: cargo test -p cktimg --release

      - name: Build (optimized)
        run: cargo build -p cktimg --release

      # Package the crate so it can be vendored or `cargo publish`ed.
      - name: Package
        run: cargo package -p cktimg --allow-dirty

      - uses: actions/upload-artifact@v4
        with:
          name: cktimg-crate
          path: target/package/cktimg-*.crate

  # On a version tag, publish to crates.io. Needs CARGO_REGISTRY_TOKEN secret.
  publish:
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - run: cargo publish -p cktimg
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
